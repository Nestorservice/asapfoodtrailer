<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat — ASAP Admin</title>
    <link rel="shortcut icon" href="/assets/img/logo/favicon.svg" type="image/x-icon">
    <link rel="manifest" href="/assets/manifest.json">
    <link rel="apple-touch-icon" href="/assets/img/logo/logo.jpg">
    <meta name="theme-color" content="#ff6b00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/admin-chat.css">
</head>
<body>
    <main class="admin-main">
        <div class="admin-chat-container">
            <!-- LIST PANELS -->
            <div class="admin-conversations-list" id="convListPanel">
                <div class="admin-conv-header">
                    <div class="header-top">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <a href="/admin/dashboard" title="Retour Dashboard" style="color: var(--text-muted); font-size: 1.2rem;"><i class="bi bi-arrow-left"></i></a>
                            <h5>💬 Conversations</h5>
                        </div>
                        <div class="header-actions">
                            <button onclick="AdminChat.toggleGlobalNotifications()" title="Notifications" id="btnNotifGlobal"><i class="bi bi-bell-fill"></i></button>
                            <button onclick="AdminChat.showGlobalMenu(event)" title="Options"><i class="bi bi-three-dots-vertical"></i></button>
                        </div>
                    </div>
                    <div class="search-container">
                        <input type="text" id="convSearch" placeholder="Rechercher...">
                        <i class="bi bi-search search-icon"></i>
                    </div>
                    <div class="filters-container">
                        <button class="filter-btn active" data-filter="all" onclick="AdminChat.setFilter('all')">Tous</button>
                        <button class="filter-btn" data-filter="unread" onclick="AdminChat.setFilter('unread')">Non lus <span class="badge" id="unreadBadgeTotal" style="display:none">0</span></button>
                    </div>
                </div>
                
                <div class="admin-conversations-scroll" id="convList">
                    <div class="chat-empty-state"><div class="spinner-border text-success"></div></div>
                </div>
            </div>

            <!-- CHAT WINDOW -->
            <div class="admin-chat-window" id="chatWindow">
                <div id="noConvSelected" class="chat-empty-state">
                    <i class="bi bi-chat-dots"></i>
                    <p>Sélectionnez une conversation</p>
                    <span style="font-size: 0.9rem; margin-top: 10px;">Connecté en tant que support ASAP</span>
                </div>
                
                <div id="activeConvArea" style="display:none; height:100%; flex-direction:column;">
                    <div class="admin-chat-header">
                        <div class="header-left" onclick="AdminChat.toggleVisitorInfo()">
                            <button class="back-btn" onclick="AdminChat.closeConv(event)"><i class="bi bi-arrow-left"></i></button>
                            <div class="header-avatar" id="activeAvatar"></div>
                            <div class="visitor-info-header">
                                <div class="visitor-name" id="activeName"></div>
                                <div class="visitor-status" id="activeStatus">En ligne</div>
                            </div>
                        </div>
                        <div class="header-right">
                            <button onclick="AdminChat.showConvSearch(event)" title="Rechercher"><i class="bi bi-search"></i></button>
                            <button onclick="AdminChat.showConvMenu(event)" title="Options"><i class="bi bi-three-dots-vertical"></i></button>
                        </div>
                    </div>

                    <div class="admin-chat-messages" id="chatMessages" onscroll="AdminChat.onScroll()">
                        <!-- Populated by JS -->
                    </div>
                    
                    <div class="scroll-badge" id="scrollBadge" onclick="AdminChat.scrollToBottom()" style="display:none">↓ Nouveaux messages</div>

                    <div class="chat-typing-indicator" id="chatTyping" style="display:none; padding: 4px 5%; font-size: 0.8rem; color: var(--text-muted); font-style: italic;">
                        En train d'écrire...
                    </div>

                    <!-- Previews -->
                    <div class="chat-reply-preview" id="replyPreview">
                        <div class="rp-content">
                            <div class="rp-name" id="replyName"></div>
                            <div class="rp-text" id="replyText"></div>
                        </div>
                        <button class="rp-close" onclick="AdminChat.cancelReply()"><i class="bi bi-x"></i></button>
                    </div>

                    <div class="chat-file-preview" id="chatFilePreview">
                        <span id="chatFileName"></span>
                        <button onclick="AdminChat.clearFile()"><i class="bi bi-x-circle-fill" style="font-size: 1.2rem; color: var(--text-muted)"></i></button>
                    </div>
                    
                    <!-- Quick Replies -->
                    <div class="quick-replies-panel" id="qrPanel" style="display:none;">
                        <div class="qr-header">
                            <span>⚡ Réponses Rapides</span>
                            <button onclick="AdminChat.toggleQRPanel()"><i class="bi bi-x"></i></button>
                        </div>
                        <div class="qr-list" id="qrList">
                            <div style="padding: 20px; text-align: center; color: #999;">Chargement...</div>
                        </div>
                        <div class="qr-add">
                            <input type="text" id="newQRInput" placeholder="Nouvelle réponse type..." onkeydown="if(event.key==='Enter') AdminChat.addQuickReply()">
                            <button onclick="AdminChat.addQuickReply()"><i class="bi bi-plus-lg"></i></button>
                        </div>
                    </div>

                    <!-- Input Area -->
                    <div class="admin-chat-input-area" id="inputArea">
                        <button class="action-btn" onclick="AdminChat.toggleQRPanel()" title="Réponses Rapides">⚡</button>
                        <button class="action-btn attach-btn" onclick="document.getElementById('chatFileInput').click()" title="Joindre un document/image"><i class="bi bi-paperclip"></i></button>
                        <input type="file" id="chatFileInput" style="display:none" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,video/*" onchange="AdminChat.onFileSelect(event)">
                        
                        <div class="input-wrapper">
                            <textarea id="chatInput" placeholder="Écrivez un message..." rows="1" oninput="AdminChat.autoResize(this)" onkeydown="AdminChat.onKeyDown(event)"></textarea>
                        </div>
                        
                        <button class="action-btn voice-btn" id="voiceBtn" onclick="AdminChat.toggleRecording()"><i class="bi bi-mic-fill"></i></button>
                        <button class="send-btn" id="chatSendBtn" disabled onclick="AdminChat.send()"><i class="bi bi-send-fill"></i></button>
                    </div>
                    
                    <!-- Recording Overlay -->
                    <div class="recording-ui" id="recordingUI" style="display:none;">
                        <div class="rec-blink"></div>
                        <span class="rec-time" id="recTime">0:00</span>
                        <canvas class="rec-visualizer" id="recCanvas" width="100" height="30"></canvas>
                        <button class="rec-cancel" onclick="AdminChat.cancelRecording()"><i class="bi bi-trash-fill"></i></button>
                        <button class="rec-send" onclick="AdminChat.stopAndSendRecording()"><i class="bi bi-send-fill" style="margin-right:2px"></i></button>
                    </div>
                </div>
                
                <!-- Visitor Info Panel -->
                <div class="visitor-info-panel" id="visitorInfoPanel">
                    <div class="vip-header">
                        <button onclick="AdminChat.toggleVisitorInfo()"><i class="bi bi-x"></i></button>
                        <h5>Infos Contact</h5>
                    </div>
                    <div class="vip-content" id="vipContent">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Image Lightbox -->
        <div class="chat-lightbox" id="chatLightbox" onclick="AdminChat.closeLightbox()" style="display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
            <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer;" onclick="AdminChat.closeLightbox()"><i class="bi bi-x-lg"></i></button>
            <img id="lightboxImg" src="" style="max-width:90%; max-height:80vh; object-fit:contain;">
            <a id="lightboxDl" href="" download target="_blank" style="color:white; text-decoration:none; margin-top:20px; font-size:1.1rem;"><i class="bi bi-download"></i> Télécharger</a>
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/stream-chat@8.14.0/dist/browser.full-bundle.min.js"></script>
    <script src="/assets/js/admin-chat.js"></script>
</body>
</html>
